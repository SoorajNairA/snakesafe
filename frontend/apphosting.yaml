# Firebase App Hosting configuration for the Next.js frontend.
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Cloud Run CPU & memory allocation
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  # Public env vars are inlined at build time (NEXT_PUBLIC_*).
  # Set these in the Firebase Console → App Hosting → Environment variables,
  # or via: firebase apphosting:secrets:set
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
  # The deployed Cloud Functions base URL — set after running firebase deploy --only functions
  - variable: NEXT_PUBLIC_API_URL
    secret: API_URL
    availability:
      - BUILD
      - RUNTIME
  # Disable emulator mode in production
  - variable: NEXT_PUBLIC_FIREBASE_USE_EMULATOR
    value: "false"
    availability:
      - BUILD
      - RUNTIME
